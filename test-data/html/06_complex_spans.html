<!DOCTYPE html>
<html>
<head><title>06_complex_spans.html</title></head>
<body>

<table border="1" id="spans-table">
  <tr>
    <th rowspan="2">ID</th>
    <th colspan="2">Personal Info</th>
    <th colspan="2">Contact</th>
  </tr>
  <tr>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Phone</th>
    <th>Email</th>
  </tr>
  <tr>
    <td>1</td>
    <td>Alice</td>
    <td>Wonderland</td>
    <td rowspan="2">555-0100</td>
    <td>alice@example.com</td>
  </tr>
  <tr>
    <td>2</td>
    <td colspan="2">Prince Charming (No last name)</td>
    <td>prince@example.com</td>
  </tr>
</table>

</body>
</html>
