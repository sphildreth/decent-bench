<!DOCTYPE html>
<html>
<head><title>08_nested_tables.html</title></head>
<body>

<table border="1" id="outer-table">
  <thead>
    <tr><th>Department</th><th>Employees</th></tr>
  </thead>
  <tbody>
    <tr>
      <td>Engineering</td>
      <td>
        <table border="1" id="inner-table-1">
          <tr><th>Name</th><th>Role</th></tr>
          <tr><td>Alice</td><td>Frontend</td></tr>
          <tr><td>Bob</td><td>Backend</td></tr>
        </table>
      </td>
    </tr>
    <tr>
      <td>Sales</td>
      <td>
        <table border="1" id="inner-table-2">
          <tr><th>Name</th><th>Role</th></tr>
          <tr><td>Charlie</td><td>Lead</td></tr>
        </table>
      </td>
    </tr>
  </tbody>
</table>

</body>
</html>
